<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mellow's hosted image website</title>

  <link href="https://fonts.cdnfonts.com/css/comicneuesansid" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>mellow's hosted image website</h1>
  </header>

  <main>
    <section class="upload-box">
      <h2>upload images</h2>
      <p>choose one or more images from your computer.</p>

      <label class="upload-button" for="image-upload">
        choose images
      </label>

      <input id="image-upload" type="file" accept="image/*" multiple>
    </section>

    <section class="image-feed" id="image-feed">
      <p class="empty-message" id="empty-message">
        your uploaded images will appear here.
      </p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
